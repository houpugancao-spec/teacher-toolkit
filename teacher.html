<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老师成绩看板 · VCE 中文</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .login{max-width:360px;margin:30px auto}
  .login input{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;margin:8px 0}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0}
  .controls select,.controls button{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;cursor:pointer}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:10px 0}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .metric .lab{font-size:12px;color:var(--muted)}
  .metric .val{font-size:24px;font-weight:700;color:var(--blue-d)}
  table.res{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px;background:#fff;border-radius:10px;overflow:hidden}
  table.res th,table.res td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line)}
  table.res th{background:#eef4ff;color:var(--blue-d);font-weight:600;position:sticky;top:52px}
  table.res tr:last-child td{border-bottom:none}
  .pct{font-weight:600}
  .pct.hi{color:var(--ok)} .pct.mid{color:#b8860b} .pct.lo{color:var(--no)}
  .tblwrap{overflow-x:auto}
  .msg{font-size:13px;margin-top:8px;min-height:18px}
  .msg.b{color:var(--no)} .msg.g{color:var(--ok)}
  /* —— 交作业统计：标签页 + 两个视图 —— */
  .tabs{display:flex;gap:6px;margin:4px 0 12px;flex-wrap:wrap}
  .tab{padding:8px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;font-size:14px;font-family:inherit;cursor:pointer;color:var(--muted)}
  .tab.on{background:var(--blue-d);color:#fff;border-color:var(--blue-d)}
  .warn{font-size:13px;margin:2px 0 8px;padding:8px 12px;border-radius:8px;background:#fff8e6;border:1px solid #f0d68a;color:#8a6d1a;min-height:0}
  .warn:empty{display:none}
  .card.list{padding:0;overflow:hidden}
  .grp{font-weight:600;margin:0;padding:9px 12px;color:var(--blue-d);font-size:13px;background:#eef4ff;border-bottom:1px solid var(--line)}
  .chk{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:14px}
  .chk:last-child{border-bottom:none}
  .chk.miss{background:#fff5f5}
  .chk .st{font-weight:600;white-space:nowrap}
  .chk.miss .st{color:var(--no)}
  .chk.ok .st{color:var(--ok)}
  .seats{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .seat{min-width:40px;text-align:center;padding:7px 8px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--line)}
  .seat.ok{background:#e9f8ef;color:var(--ok);border-color:#bfe6cd}
  .seat.miss{background:#fdecec;color:var(--no);border-color:#f2c2c2}
  .misslist{margin-top:12px;font-size:15px;font-weight:600}
  .misslist .no{color:var(--no)}
</style>
</head>
<body>
<div class="topbar"><div class="row"><div class="brand">VCE 中文 · 老师成绩看板</div><a href="index.html" style="background:rgba(255,255,255,.18);color:#fff;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:500;white-space:nowrap;margin-left:auto">🏠 授课网站</a><div class="score" id="who" style="display:none"></div></div></div>
<div class="wrap">

  <div id="loginView" class="card login">
    <div style="font-weight:600;margin-bottom:6px">🔐 老师登录</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:6px">仅老师可见，学生看不到。</div>
    <input id="email" type="email" placeholder="邮箱 email" autocomplete="username">
    <input id="pwd" type="password" placeholder="密码 password" autocomplete="current-password">
    <button id="loginBtn" class="submit-btn" style="width:100%;margin-top:6px">登录 Log in</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <div id="dashView" style="display:none">
    <div class="tabs">
      <button class="tab on" data-view="detail">📋 成绩明细</button>
      <button class="tab" data-view="byStudent">🧑 交作业 · 按学生</button>
      <button class="tab" data-view="byExercise">📝 交作业 · 按练习</button>
      <button id="logoutBtn" style="margin-left:auto;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;cursor:pointer">退出</button>
    </div>
    <div id="orphanWarn" class="warn"></div>
    <div id="yearNote" style="font-size:12px;color:var(--muted);margin:-2px 0 8px"></div>

    <!-- 视图①：成绩明细（原看板）-->
    <div id="viewDetail">
      <div class="controls">
        <select id="fCat"><option value="">全部类别</option></select>
        <select id="fLesson"><option value="">全部项目</option></select>
        <select id="fClass"><option value="">全部班级</option></select>
        <select id="fSeat"><option value="">全部座号</option></select>
        <button id="refreshBtn">🔄 刷新</button>
        <button id="csvBtn">⬇ 导出CSV</button>
      </div>
      <div class="metrics" id="metrics"></div>
      <div id="analysis"></div>
      <div class="tblwrap"><table class="res" id="tbl"></table></div>
      <div id="dashMsg" class="msg"></div>
    </div>

    <!-- 视图②：按学生 —— 这名学生哪些没交 -->
    <div id="viewByStudent" style="display:none">
      <div class="controls">
        <select id="sClass"></select>
        <select id="sSeat"></select>
        <button id="sRefresh">🔄 刷新</button>
      </div>
      <div class="metrics" id="sMetrics"></div>
      <div id="sList"></div>
    </div>

    <!-- 视图③：按练习 —— 这一节谁没交 -->
    <div id="viewByExercise" style="display:none">
      <div class="controls">
        <select id="eLesson"></select>
        <select id="eClass"></select>
        <button id="eRefresh">🔄 刷新</button>
        <button id="eCsv">⬇ 导出CSV</button>
      </div>
      <div class="metrics" id="eMetrics"></div>
      <div id="eGrid"></div>
    </div>
  </div>

</div>

<script src="assets/catalog.js"></script>
<script src="assets/report-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  const SUPABASE_URL="https://xzexcfqrftllicoqaizs.supabase.co";
  const SUPABASE_KEY="sb_publishable_ly64tG2XPMv8N-34Np5qkQ_2d8rNRU5";
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const CN=["一","二","三","四","五","六","七","八","九","十"];

  // lesson id → 好看的名字（读 catalog）
  const LMAP={};
  (window.CATALOG?CATALOG.grades:[]).forEach(g=>(g.lecture||[]).forEach(co=>(co.sections||[]).forEach(s=>{LMAP[s.id]=`${co.no}${co.title}·第${CN[s.n-1]}节`;})));
  const lname=id=>LMAP[id]||id;

  const $=id=>document.getElementById(id);
  let ROWS=[];

  async function init(){
    const {data:{session}}=await sb.auth.getSession();
    if(session) showDash(session); else showLogin();
  }
  function showLogin(){$('loginView').style.display='';$('dashView').style.display='none';$('who').style.display='none';}
  function showDash(session){
    $('loginView').style.display='none';$('dashView').style.display='';
    $('who').style.display='';$('who').textContent=session.user.email;
    load();
  }

  $('loginBtn').onclick=async()=>{
    const email=$('email').value.trim(), password=$('pwd').value;
    const m=$('loginMsg'); m.textContent="登录中…";m.className="msg";
    const {data,error}=await sb.auth.signInWithPassword({email,password});
    if(error){m.textContent="登录失败："+error.message;m.className="msg b";}
    else{m.textContent="";showDash(data.session);}
  };
  $('logoutBtn').onclick=async()=>{await sb.auth.signOut();showLogin();};
  $('refreshBtn').onclick=load;

  async function load(){
    const m=$('dashMsg');m.textContent="读取中…";m.className="msg";
    const {data,error}=await sb.from('kongzi_results').select('*').order('created_at',{ascending:false});
    if(error){m.textContent="读取失败："+error.message+"（是否已加 select 权限策略？）";m.className="msg b";return;}
    const cut=(window.REPORT_CONFIG||{}).schoolYearStart;
    ROWS=(data||[]).filter(r=>!cut || new Date(r.created_at)>=new Date(cut));
    m.textContent="";
    $('yearNote').textContent = cut ? `📅 只显示 ${cut} 起的提交（共 ${ROWS.length} 条）· 明年重置改 report-config.js 的 schoolYearStart` : '';
    fillFilters();
    render();
    buildReport();
  }
  function fill(sel,vals,labelFn,ph){
    const cur=sel.value;
    sel.innerHTML=`<option value="">${ph||'全部'}</option>`+vals.map(v=>`<option value="${v}">${labelFn?labelFn(v):v}</option>`).join("");
    if(vals.indexOf(cur)>=0) sel.value=cur;
  }
  function fillFilters(){
    fill($('fCat'), [...new Set(ROWS.map(r=>r.category||'授课'))].sort(), null, '全部类别');
    fillLessons();
    fill($('fClass'), [...new Set(ROWS.map(r=>r.class_code).filter(Boolean))].sort(), null, '全部班级');
    fillSeats();
  }
  function fillSeats(){
    const c=$('fClass').value;
    const seats=[...new Set(ROWS.filter(r=>!c||r.class_code===c).map(r=>r.seat_no).filter(x=>x!=null&&x!==''))]
      .sort((a,b)=>(parseInt(a,10)||0)-(parseInt(b,10)||0)).map(String);
    fill($('fSeat'), seats, null, '全部座号');
  }
  function fillLessons(){
    const cat=$('fCat').value;
    const ls=[...new Set(ROWS.filter(r=>!cat||(r.category||'授课')===cat).map(r=>r.lesson))].sort();
    fill($('fLesson'), ls, lname, '全部项目');
  }
  $('fCat').onchange=()=>{fillLessons();render();};
  $('fLesson').onchange=render; $('fClass').onchange=()=>{fillSeats();render();}; $('fSeat').onchange=render;

  function filtered(){
    const cat=$('fCat').value, l=$('fLesson').value, c=$('fClass').value, s=$('fSeat').value.trim();
    return ROWS.filter(r=>(!cat||(r.category||'授课')===cat)&&(!l||r.lesson===l)&&(!c||r.class_code===c)&&(!s||String(r.seat_no)===s));
  }
  function render(){
    const rows=filtered();
    // 指标
    const n=rows.length;
    const classes=new Set(rows.map(r=>r.class_code).filter(Boolean)).size;
    const pcts=rows.map(r=>r.max_score?r.score/r.max_score:0);
    const avg=n?Math.round(pcts.reduce((a,b)=>a+b,0)/n*100):0;
    $('metrics').innerHTML=
      metric("总提交数",n)+metric("参与班级",classes)+metric("平均正确率",avg+"%");
    // 表格
    let h=`<tr><th>时间(墨尔本)</th><th>类别</th><th>班级</th><th>座号</th><th>课节/项目</th><th>得分</th></tr>`;
    h+=rows.map(r=>{
      const t=new Date(r.created_at).toLocaleString('en-AU',{timeZone:'Australia/Melbourne',year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const p=r.max_score?Math.round(r.score/r.max_score*100):0;
      const cls=p>=80?'hi':p>=50?'mid':'lo';
      return `<tr><td>${t}</td><td>${r.category||'授课'}</td><td>${r.class_code||''}</td><td>${r.seat_no||''}</td><td>${lname(r.lesson)}</td><td><span class="pct ${cls}">${r.score}/${r.max_score} · ${p}%</span></td></tr>`;
    }).join("");
    $('tbl').innerHTML=h;
    renderAnalysis(rows);
  }
  const metric=(lab,val)=>`<div class="metric"><div class="lab">${lab}</div><div class="val">${val}</div></div>`;

  function renderAnalysis(rows){
    const box=$('analysis');
    if(!$('fLesson').value){box.innerHTML="<div class='msg' style='color:var(--muted);margin:8px 0'>💡 选上面的「课节」下拉，可看这一节每道题的正确率</div>";return;}
    const agg={};
    rows.forEach(r=>(r.details||[]).forEach(d=>{const k=d.q;(agg[k]=agg[k]||{ok:0,n:0}).n++;if(d.ok)agg[k].ok++;}));
    const items=Object.keys(agg).map(k=>({q:k,ok:agg[k].ok,n:agg[k].n,pct:Math.round(agg[k].ok/agg[k].n*100)})).sort((a,b)=>a.pct-b.pct);
    if(!items.length){box.innerHTML="<div class='msg' style='color:var(--muted);margin:8px 0'>这一节暂无题目明细（学生用升级后的页面做题才会有）</div>";return;}
    box.innerHTML=`<div style="font-weight:600;margin:16px 0 4px">📊 每题正确率（低→高，红=最难，重点讲）</div>`+
      `<div class="tblwrap"><table class="res"><tr><th>题目</th><th>正确率</th><th>答对/人数</th></tr>`+
      items.map(it=>{const cls=it.pct>=80?'hi':it.pct>=50?'mid':'lo';return `<tr><td>${it.q}</td><td><span class="pct ${cls}">${it.pct}%</span></td><td>${it.ok}/${it.n}</td></tr>`;}).join("")+`</table></div>`;
  }

  /* ===== 交作业统计：按学生 / 按练习 ===== */
  const RC = window.REPORT_CONFIG || {roster:{}, assignments:[]};
  const NORM = s => String(s==null?'':s).trim().toUpperCase();
  const seatNum = s => { const n=parseInt(String(s==null?'':s).trim(),10); return isNaN(n)?null:n; };
  const rosterKey = c => Object.keys(RC.roster).find(k=>NORM(k)===NORM(c));   // 大小写容错
  const assignName = id => { const a=RC.assignments.find(x=>x.id===id); return a?a.name:lname(id); };
  let SUBMITTED = new Map();   // `${班级大写}|${座号}|${课节}` → 最新一条

  function buildReport(){
    SUBMITTED = new Map();
    ROWS.forEach(r=>{
      const c=NORM(r.class_code), s=seatNum(r.seat_no); if(s==null) return;
      const key=c+'|'+s+'|'+r.lesson, prev=SUBMITTED.get(key);
      if(!prev || new Date(r.created_at)>new Date(prev.created_at)) SUBMITTED.set(key,r);
    });
    fillReportControls(); renderOrphan(); renderStudent(); renderExercise();
  }
  function fillReportControls(){
    const classes=Object.keys(RC.roster);
    fill($('sClass'), classes, null, '选班级');
    fill($('eClass'), classes, null, '选班级');
    fill($('eLesson'), RC.assignments.map(a=>a.id), assignName, '选练习/课节');
    fillSeat();
  }
  function fillSeat(){
    const cls=$('sClass').value, seats=cls?(RC.roster[cls]||[]):[];
    fill($('sSeat'), seats.map(String), null, '选座号');
  }

  // 花名册外提交（访客/老师测试，或学生填错班号）——温和提示
  function renderOrphan(){
    const box=$('orphanWarn'); if(!box) return;
    const seen=new Set(), bad=[];
    ROWS.forEach(r=>{
      const c=NORM(r.class_code), s=seatNum(r.seat_no), key=c+'|'+s;
      if(seen.has(key)) return; seen.add(key);
      const rk=rosterKey(c);
      if(!(rk && (RC.roster[rk]||[]).includes(s))) bad.push((r.class_code||'?')+'-'+(r.seat_no||'?'));
    });
    box.innerHTML = bad.length
      ? `⚠️ ${bad.length} 个提交身份在花名册外（访客/老师测试，或学生填错班号）：${bad.slice(0,20).map(x=>`<b>${x}</b>`).join('、')}${bad.length>20?' …':''}`
      : '';
  }

  // 视图②：按学生 —— 这名学生哪些没交
  $('sClass').onchange=()=>{ fillSeat(); renderStudent(); };
  $('sSeat').onchange=renderStudent;
  $('sRefresh').onclick=load;
  function renderStudent(){
    const cls=$('sClass').value, seat=seatNum($('sSeat').value), box=$('sList');
    if(!cls || seat==null){ $('sMetrics').innerHTML=''; box.innerHTML="<div class='msg' style='color:var(--muted)'>选班级 + 座号，看这名学生每一节交了没</div>"; return; }
    const C=NORM(cls);
    const items=RC.assignments.map(a=>({a, row:SUBMITTED.get(C+'|'+seat+'|'+a.id)}));
    const done=items.filter(x=>x.row).length, total=items.length;
    $('sMetrics').innerHTML=metric("该交",total)+metric("已交",done)+metric("未交",total-done);
    let h='', grp='';
    items.forEach(({a,row})=>{
      if(a.group!==grp){ grp=a.group; h+=`<div class="grp">${grp}</div>`; }
      if(row){ const t=new Date(row.created_at).toLocaleDateString('en-AU',{timeZone:'Australia/Melbourne',month:'2-digit',day:'2-digit'});
        h+=`<div class="chk ok"><span>${a.name}</span><span class="st">✅ ${row.score}/${row.max_score} · ${t}</span></div>`;
      } else { h+=`<div class="chk miss"><span>${a.name}</span><span class="st">❌ 未交</span></div>`; }
    });
    box.innerHTML=`<div class="card list">${h}</div>`;
  }

  // 视图③：按练习 —— 这一节谁没交
  $('eLesson').onchange=renderExercise;
  $('eClass').onchange=renderExercise;
  $('eRefresh').onclick=load;
  function renderExercise(){
    const lesson=$('eLesson').value, cls=$('eClass').value, box=$('eGrid');
    if(!lesson || !cls){ $('eMetrics').innerHTML=''; box.innerHTML="<div class='msg' style='color:var(--muted)'>选练习 + 班级，看这一节谁没交</div>"; return; }
    const C=NORM(cls), seats=RC.roster[cls]||[], miss=[];
    seats.forEach(s=>{ if(!SUBMITTED.get(C+'|'+s+'|'+lesson)) miss.push(s); });
    $('eMetrics').innerHTML=metric("应交",seats.length)+metric("已交",seats.length-miss.length)+metric("未交",miss.length);
    const chips=seats.map(s=>{ const ok=!!SUBMITTED.get(C+'|'+s+'|'+lesson); return `<span class="seat ${ok?'ok':'miss'}">${ok?'✓':'✗'}${s}</span>`; }).join("");
    const missTxt=miss.length?`<div class="misslist">缺 <span class="no">${miss.length}</span> 人：座号 <span class="no">${miss.join('、')}</span></div>`:`<div class="misslist" style="color:var(--ok)">🎉 全班都交了！</div>`;
    box.innerHTML=`<div class="card"><div style="font-weight:600;margin-bottom:6px">${assignName(lesson)} · ${esc0(cls)} 班</div><div class="seats">${chips}</div>${missTxt}</div>`;
  }
  const esc0 = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  $('eCsv').onclick=()=>{
    const lesson=$('eLesson').value, cls=$('eClass').value; if(!lesson||!cls) return;
    const C=NORM(cls), seats=RC.roster[cls]||[];
    const head=["班级","座号","状态","课节"];
    const lines=seats.map(s=>{ const ok=!!SUBMITTED.get(C+'|'+s+'|'+lesson); return [cls,s,ok?'已交':'未交',assignName(lesson)].map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","); });
    const csv="﻿"+[head.join(","),...lines].join("\n");
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`交作业_${cls}_${lesson}.csv`;a.click();
  };

  // 标签页切换
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); t.classList.add('on');
    const v=t.dataset.view;
    $('viewDetail').style.display     = v==='detail'     ? '' : 'none';
    $('viewByStudent').style.display  = v==='byStudent'  ? '' : 'none';
    $('viewByExercise').style.display = v==='byExercise' ? '' : 'none';
    if(v==='byStudent') renderStudent();
    if(v==='byExercise') renderExercise();
  });

  $('csvBtn').onclick=()=>{
    const rows=filtered();
    const head=["时间UTC","类别","班级","座号","课节id","课节","得分","满分","正确率%"];
    const lines=rows.map(r=>[r.created_at,r.category||'授课',r.class_code||'',r.seat_no||'',r.lesson,lname(r.lesson),r.score,r.max_score,r.max_score?Math.round(r.score/r.max_score*100):''].map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","));
    const csv="﻿"+[head.join(","),...lines].join("\n");
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download="成绩_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  };

  init();
})();
</script>
<script>if('serviceWorker' in navigator){var _hadCtrl=!!navigator.serviceWorker.controller;navigator.serviceWorker.register('sw.js').catch(function(){});var _reloaded=false;navigator.serviceWorker.addEventListener('controllerchange',function(){if(_reloaded||!_hadCtrl)return;_reloaded=true;location.reload();});}</script>
</body>
</html>
